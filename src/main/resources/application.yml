spring:
  application:
    name: IFMS-Backend


  # ── Database + HikariCP Connection Pool ────────────────────
  # Tối ưu cho ~1000 concurrent requests
  # Formula: pool-size = (core_count * 2) + disk_spindles ≈ 20-30 cho production
  datasource:
    url: jdbc:postgresql://db.ernzepnkvyyksjojgays.supabase.co:5432/postgres?sslmode=require
    username: ${DB_USERNAME:IFMSadmin}
    password: ${DB_PASSWORD:IFMS}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 10                   # Connections giữ sẵn khi idle
      maximum-pool-size: 30              # Max connections trong pool (1000 req / ~30-50ms per query)
      idle-timeout: 300000               # 5 phút — đóng idle connection sau thời gian này
      max-lifetime: 1800000              # 30 phút — recycle connection tránh DB timeout
      connection-timeout: 5000           # 5 giây — throw exception nếu không lấy được connection
      leak-detection-threshold: 30000    # 30 giây — log warning nếu connection bị giữ quá lâu
      pool-name: IFMS-HikariPool

  jpa:
    hibernate:
      ddl-auto: validate            # Validate schema khi startup (không tự động tạo/alter)
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false                  # Tắt OSIV — tránh lazy loading trong controller layer

  # ── Flyway Database Migration ──────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration


  # ── Jackson (JSON Serialization) ───────────────────────────
  jackson:
    default-property-inclusion: non_null       # Loại bỏ trường null → giảm payload size
    serialization:
      write-dates-as-timestamps: false         # LocalDateTime → "2026-03-02T10:15:30" (ISO-8601)
      fail-on-empty-beans: false               # Không throw khi serialize empty object
    deserialization:
      fail-on-unknown-properties: false        # Không throw khi nhận field lạ từ client
    date-format: yyyy-MM-dd'T'HH:mm:ss        # Fallback format cho java.util.Date

  # ── Async Task Executor ────────────────────────────────────
  # Core pool xử lý mail, notification gửi ngầm qua @Async
  task:
    execution:
      pool:
        core-size: 10                    # Thread sẵn sàng
        max-size: 20                     # Max thread khi queue đầy
        queue-capacity: 100              # Hàng đợi trước khi tạo thread mới
      thread-name-prefix: ifms-async-

  # ── Redis (Message Queue for Email, Caching) ────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}           # Blank = no auth (dev mode)
      timeout: 5000ms
      lettuce:
        pool:
          min-idle: 2
          max-idle: 8
          max-active: 16                     # Max concurrent Redis connections
          max-wait: 3000ms


  # ── Spring Cache (Redis) ────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: ${CACHE_TTL_MS:3600000}  # Default TTL: 1 giờ (ms)
      use-key-prefix: true                    # Tạo prefix "cacheName::" cho dễ quản lý
      cache-null-values: false


  # ── Servlet (File Upload Limit) ────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  # ── rabbitMQ ────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    mail:
      exchange: ${RABBITMQ_MAIL_EXCHANGE:mailExchange}
      dlx: ${RABBITMQ_MAIL_DLX:mailDLX}
      onboard:
        queue: ${RABBITMQ_MAIL_ONBOARD_QUEUE:mailOnboardQueue}
        routing-key: ${RABBITMQ_MAIL_ONBOARD_ROUTING_KEY:mailOnboard}
        dlq: ${RABBITMQ_MAIL_ONBOARD_DLQ:mailOnboardDLQ}
        dlq-routing-key: ${RABBITMQ_MAIL_ONBOARD_DLQ_ROUTING_KEY:mailOnboardDead}
      forget-password:
        queue: ${RABBITMQ_MAIL_FORGET_PASSWORD_QUEUE:mailForgetPasswordQueue}
        routing-key: ${RABBITMQ_MAIL_FORGET_PASSWORD_ROUTING_KEY:mailForgetPassword}
        dlq: ${RABBITMQ_MAIL_FORGET_PASSWORD_DLQ:mailForgetPasswordDLQ}
        dlq-routing-key: ${RABBITMQ_MAIL_FORGET_PASSWORD_DLQ_ROUTING_KEY:mailForgetPasswordDead}
      warning:
        queue: ${RABBITMQ_MAIL_WARNING_QUEUE:mailWarningQueue}
        routing-key: ${RABBITMQ_MAIL_WARNING_ROUTING_KEY:mailWarning}
        dlq: ${RABBITMQ_MAIL_WARNING_DLQ:mailWarningDLQ}
        dlq-routing-key: ${RABBITMQ_MAIL_WARNING_DLQ_ROUTING_KEY:mailWarningDead}
      # Template config cho 1 loại mail mới theo Strategy Pattern.
      # Khi implement thật, đổi key `custom` thành tên nghiệp vụ và wire vào config/strategy/consumer.
      custom:
        queue: ${RABBITMQ_MAIL_CUSTOM_QUEUE:mailCustomQueue}
        routing-key: ${RABBITMQ_MAIL_CUSTOM_ROUTING_KEY:mailCustom}
        dlq: ${RABBITMQ_MAIL_CUSTOM_DLQ:mailCustomDLQ}
        dlq-routing-key: ${RABBITMQ_MAIL_CUSTOM_DLQ_ROUTING_KEY:mailCustomDead}
    audit:
      exchange: ${RABBITMQ_AUDIT_EXCHANGE:auditExchange}
      dlx: ${RABBITMQ_AUDIT_DLX:auditDLX}
      queue: ${RABBITMQ_AUDIT_QUEUE:auditQueue}
      routing-key: ${RABBITMQ_AUDIT_ROUTING_KEY:audit}
      dlq: ${RABBITMQ_AUDIT_DLQ:auditDLQ}
      dlq-routing-key: ${RABBITMQ_AUDIT_DLQ_ROUTING_KEY:auditDead}
    notification:
      exchange: ${RABBITMQ_NOTIFICATION_EXCHANGE:notificationExchange}
      dlx: ${RABBITMQ_NOTIFICATION_DLX:notificationDLX}
      queue: ${RABBITMQ_NOTIFICATION_QUEUE:notificationQueue}
      routing-key: ${RABBITMQ_NOTIFICATION_ROUTING_KEY:notification.send}
      dlq: ${RABBITMQ_NOTIFICATION_DLQ:notificationDLQ}
      dlq-routing-key: ${RABBITMQ_NOTIFICATION_DLQ_ROUTING_KEY:notificationDead}



# ── Cloudinary (SDK Connection Only) ───────────────────────
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your_cloud_name}
  api-key: ${CLOUDINARY_API_KEY:your_api_key}
  api-secret: ${CLOUDINARY_API_SECRET:your_api_secret}

# ── Application Security ───────────────────────────────────
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:1800000}                        # 30 minutes
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000}            # 7 days
    pin:
      length: ${PIN_LENGTH:5}
      max-retry: ${PIN_MAX_RETRY:5}
      lock-minutes: ${PIN_LOCK_MINUTES:5}

  # ── Brevo Mail ───────────────────────────────────
  mail:
    brevo-api-key: ${BREVO_API_KEY:your_brevo_api_key}
    from-email: ${MAIL_FROM_EMAIL:noreply@ifms.vn}
    from-name: ${MAIL_FROM_NAME:IFMS System}


# ── Server ─────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024              # Nén response > 1KB

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.mkwang.backend: ${LOG_LEVEL:DEBUG}
    org.springframework.security: WARN
    com.zaxxer.hikari: INFO              # Monitor connection pool
    org.flywaydb: INFO


# ── custom ttl ─────────────────────────────────────────────────
app:
  otp:
    ttl: ${OTP_TTL_MS:300000}            # 5 phút (ms)
    length: ${OTP_LENGTH:6}
  auth:
    setup-token-ttl-minutes: ${SETUP_TOKEN_TTL_MINUTES:15}   # First-login setup token TTL (phút)
  demo:
    reset-accounts-on-startup: ${DEMO_RESET_ACCOUNTS_ON_STARTUP:true}
    reset-payroll-wallets-on-startup: ${DEMO_RESET_PAYROLL_WALLETS_ON_STARTUP:true}
  notification:
    cleanup-cron: ${NOTIFICATION_CLEANUP_CRON:0 0 0 * * *}   # Xóa notification đã đọc lúc 00:00 mỗi ngày

  # ── MockBank (Corporate Banking API for Withdrawals) ────────────
  banking:
    base-url: ${BANK_API_URL:http://localhost:8081}
    api-key: ${BANK_API_KEY:mock-bank-secret-key-2026}
    company-account: ${COMPANY_BANK_ACCOUNT:9704366000000001}
    connect-timeout-ms: ${BANK_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${BANK_READ_TIMEOUT_MS:10000}

  # ── Cache TTL per cache name ─────────────────────────────────────
  cache:
    system-config-ttl-ms: ${SYSTEM_CONFIG_CACHE_TTL_MS:86400000}  # 24h — configs change rarely

  # ── VNPay (Deposit payment gateway) ────────────────────────────
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:DEMO1234}
    hash-secret: ${VNPAY_HASH_SECRET:change_me}
    payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay/result}
    ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay/ipn}
    version: "2.1.0"
    command: pay
    order-type: other
    locale: ${VNPAY_LOCALE:vn}
    default-expire-minutes: ${VNPAY_DEFAULT_EXPIRE_MINUTES:15}
